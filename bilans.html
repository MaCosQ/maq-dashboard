<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi des bilans — QUERCY & Associés</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brg:       #1B4332;
    --brg-faint: #f0f4f1;
    --brg-10:    rgba(27,67,50,0.10);
    --green-ok:  #166534;
    --green-bg:  #dcfce7;
    --amber:     #d97706;
    --amber-bg:  #fef3c7;
    --gray-50:   #f9fafb;
    --gray-100:  #f3f4f6;
    --gray-200:  #e5e7eb;
    --gray-400:  #9ca3af;
    --gray-600:  #4b5563;
    --gray-800:  #1f2937;
    --sb-width:  220px;
  }
  html, body { height:100%; font-family:'Segoe UI',system-ui,sans-serif; font-size:13px; background:var(--gray-50); color:var(--gray-800); }

  /* ── LAYOUT ── */
  .layout { display:flex; height:100vh; overflow:hidden; }

  /* ── SIDEBAR ── */
  .sidebar { width:var(--sb-width); min-width:var(--sb-width); background:var(--brg); display:flex; flex-direction:column; transition:width .22s ease; overflow:hidden; z-index:10; flex-shrink:0; }
  .sidebar.collapsed { width:48px; min-width:48px; }
  .sb-logo { display:flex; align-items:center; gap:10px; padding:14px 14px 12px; border-bottom:1px solid rgba(255,255,255,.1); flex-shrink:0; }
  .sb-logo-mark { width:28px; height:28px; border-radius:6px; background:rgba(255,255,255,.15); color:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .sb-logo img  { width:28px; height:28px; border-radius:6px; object-fit:contain; flex-shrink:0; }
  .sb-logo-text { color:#fff; font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; }
  .nav-section  { color:rgba(255,255,255,.35); font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; padding:10px 14px 4px; white-space:nowrap; overflow:hidden; }
  .sidebar.collapsed .nav-section { opacity:0; pointer-events:none; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:8px 14px; color:rgba(255,255,255,.65); text-decoration:none; font-size:12px; transition:all .15s; white-space:nowrap; overflow:hidden; border-left:3px solid transparent; }
  .nav-item:hover { background:rgba(255,255,255,.08); color:#fff; }
  .nav-item.active { background:rgba(255,255,255,.14); color:#fff; font-weight:600; border-left-color:#86efac; }
  .nav-item.nav-disabled { opacity:.35; pointer-events:none; }
  .nav-icon  { font-size:14px; width:18px; text-align:center; flex-shrink:0; }
  .nav-label { overflow:hidden; }
  .sb-toggle { margin:auto 14px 12px; background:none; border:none; color:rgba(255,255,255,.45); cursor:pointer; font-size:13px; padding:4px 6px; border-radius:4px; transition:all .15s; display:block; text-align:left; }
  .sb-toggle:hover { color:#fff; background:rgba(255,255,255,.1); }

  /* ── MAIN ── */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
  .topbar { height:52px; background:#fff; border-bottom:1px solid var(--gray-200); display:flex; align-items:center; padding:0 20px; gap:14px; flex-shrink:0; }
  .topbar-title { font-size:15px; font-weight:700; color:var(--brg); }
  .topbar-sep { width:1px; height:20px; background:var(--gray-200); }
  .topbar-periode { font-size:12px; color:var(--gray-400); }
  .view-toggle { display:flex; background:var(--gray-100); border-radius:7px; padding:3px; gap:2px; margin-left:auto; }
  .view-btn { padding:5px 14px; border-radius:5px; border:none; cursor:pointer; font-size:11px; font-weight:600; transition:all .15s; background:transparent; color:var(--gray-400); }
  .view-btn.active { background:#fff; color:var(--brg); box-shadow:0 1px 3px rgba(0,0,0,.1); }

  /* ── FILTRES GLOBAUX ── */
  .filters-bar { background:#fff; border-bottom:1px solid var(--gray-200); padding:8px 20px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; flex-shrink:0; }
  .filter-label { font-size:11px; color:var(--gray-400); font-weight:700; white-space:nowrap; }
  .filter-sep { width:1px; height:20px; background:var(--gray-200); }
  select.f-sel { font-size:11px; font-weight:600; color:var(--brg); border:1px solid rgba(27,67,50,.25); border-radius:5px; padding:4px 8px; background:#fff; cursor:pointer; outline:none; }
  .search-wrap { position:relative; margin-left:auto; }
  .search-wrap svg { position:absolute; left:8px; top:50%; transform:translateY(-50%); pointer-events:none; }
  .search-wrap input { padding:5px 10px 5px 26px; border:1px solid var(--gray-200); border-radius:6px; font-size:11px; width:180px; outline:none; transition:border-color .15s; }
  .search-wrap input:focus { border-color:#40916C; }

  /* ── STATS ── */
  .stats-bar { background:var(--gray-50); border-bottom:1px solid var(--gray-200); padding:6px 20px; display:flex; gap:24px; align-items:center; flex-shrink:0; }
  .stat-item { display:flex; align-items:center; gap:6px; }
  .stat-val  { font-size:16px; font-weight:800; }
  .stat-lbl  { font-size:11px; color:var(--gray-400); }

  /* ── CONTENT ── */
  .content { flex:1; overflow:auto; padding:16px 20px; }

  /* ── TABLEAU ── */
  .table-wrap { border-radius:8px; box-shadow:0 1px 8px rgba(0,0,0,.07); border:1px solid var(--gray-200); overflow:auto; }
  table { width:100%; border-collapse:collapse; font-size:12px; }

  /* En-tête principal */
  thead tr.tr-header { background:var(--brg); position:sticky; top:0; z-index:3; }
  thead th { padding:9px 5px; font-weight:700; font-size:10px; letter-spacing:.05em; text-transform:uppercase; color:#fff; text-align:center; white-space:nowrap; }
  thead th.th-left { text-align:left; padding-left:12px; }
  thead th.th-etape { font-size:9px; line-height:1.2; white-space:normal; width:36px; min-width:36px; vertical-align:bottom; padding:6px 2px 5px; }
  thead th.th-etape.sp { color:#fde68a; }
  thead th.th-etape:not(.sp) { color:#bbf7d0; }

  /* Ligne de filtres par étape */
  thead tr.tr-filters { background:#f0f4f1; position:sticky; top:37px; z-index:2; border-bottom:2px solid var(--gray-200); }
  thead tr.tr-filters td { padding:3px 2px; text-align:center; }
  thead tr.tr-filters td.td-spacer { padding:0; }

  /* Boutons filtres étape */
  .etape-filter-btn {
    width:26px; height:22px; border-radius:4px; border:1.5px solid var(--gray-200);
    background:#fff; cursor:pointer; font-size:9px; font-weight:700;
    display:flex; align-items:center; justify-content:center; margin:0 auto;
    transition:all .12s; color:var(--gray-400); position:relative;
  }
  .etape-filter-btn:hover { border-color:var(--brg); color:var(--brg); }
  .etape-filter-btn.on-ok   { background:var(--green-bg); border-color:var(--green-ok); color:var(--green-ok); }
  .etape-filter-btn.on-no   { background:#fee2e2; border-color:#ef4444; color:#ef4444; }
  .etape-filter-btn.on-sp   { background:var(--amber-bg); border-color:var(--amber); color:var(--amber); }

  /* Légende filtres */
  .filter-legend { font-size:10px; color:var(--gray-400); padding:4px 20px 0; display:flex; gap:14px; align-items:center; flex-shrink:0; }
  .fl-item { display:flex; align-items:center; gap:4px; }
  .fl-dot  { width:10px; height:10px; border-radius:2px; }

  /* Corps du tableau */
  tbody tr { border-bottom:1px solid #f0f0f0; transition:background .1s; }
  tbody tr:nth-child(even) { background:var(--gray-50); }
  tbody tr:hover { background:var(--brg-faint) !important; }
  tbody td { padding:5px 4px; text-align:center; }
  tbody td.td-left { text-align:left; padding-left:12px; }
  tbody td.td-mono { font-family:'Courier New',monospace; color:var(--gray-400); font-size:11px; }

  /* Colonne nom — compacte, tronquée */
  .nom-cell { max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; color:var(--gray-800); font-size:12px; display:block; }

  /* Type / badges */
  .badge-type { display:inline-block; font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; }
  .badge-P   { background:#dbeafe; color:#1e40af; }
  .badge-SP  { background:#ede9fe; color:#7c3aed; }
  .badge-SCI { background:#fef3c7; color:#b45309; }
  .badge-ST  { background:#ccfbf1; color:#0f766e; }
  .badge-assoc { display:inline-block; font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; background:var(--brg-10); color:var(--brg); min-width:28px; text-align:center; }
  .rm-text { font-size:11px; font-weight:600; color:var(--gray-600); }

  /* Cases à cocher */
  .check-cell { width:26px; height:26px; border-radius:5px; margin:0 auto; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .12s; border:1.5px solid var(--gray-200); background:var(--gray-100); }
  .check-cell svg { display:none; }
  .check-cell.ok  { background:var(--green-bg); border-color:var(--green-ok); }
  .check-cell.ok svg { display:block; }
  .check-cell.sp  { background:var(--amber-bg); border-color:var(--amber); }
  .check-cell.sp svg { display:block; }

  /* ── PAGINATION ── */
  .pagination { display:flex; align-items:center; justify-content:space-between; margin-top:12px; }
  .pag-info { font-size:11px; color:var(--gray-400); }
  .pag-btns { display:flex; gap:3px; }
  .p-btn { width:28px; height:28px; border-radius:5px; border:1px solid var(--gray-200); background:#fff; color:var(--gray-600); font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .12s; }
  .p-btn:hover:not(:disabled) { border-color:var(--brg); color:var(--brg); }
  .p-btn.active { background:var(--brg); border-color:var(--brg); color:#fff; font-weight:700; }
  .p-btn:disabled { opacity:.3; cursor:not-allowed; }
  .pag-ell { font-size:11px; color:var(--gray-400); align-self:center; padding:0 2px; }

  /* ── KANBAN ── */
  .kanban-wrap { display:flex; gap:8px; align-items:flex-start; padding-bottom:12px; }
  .kanban-col  { min-width:172px; max-width:172px; flex-shrink:0; background:var(--gray-100); border-radius:10px; padding:10px 8px; border:2px solid transparent; transition:all .15s; }
  .kanban-col.drag-over { background:#e8f5e9; border-color:var(--brg); }
  .kcol-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding-bottom:8px; border-bottom:2px solid var(--brg); }
  .kcol-header.sp { border-bottom-color:var(--amber); }
  .kcol-title { font-size:10px; font-weight:700; color:var(--brg); text-transform:uppercase; letter-spacing:.05em; }
  .kcol-title.sp { color:var(--amber); }
  .kcol-count { font-size:11px; font-weight:700; border-radius:20px; padding:1px 8px; background:var(--brg-faint); color:var(--brg); }
  .kcol-count.sp { background:var(--amber-bg); color:var(--amber); }
  .kcol-cards { display:flex; flex-direction:column; gap:6px; max-height:calc(100vh - 240px); overflow-y:auto; }
  .kcard { background:#fff; border-radius:7px; padding:9px 11px; box-shadow:0 1px 3px rgba(0,0,0,.07); cursor:grab; border:1px solid var(--gray-200); transition:box-shadow .15s; user-select:none; }
  .kcard:hover { box-shadow:0 3px 8px rgba(27,67,50,.15); }
  .kcard.dragging { opacity:.4; }
  .kcard-name { font-size:12px; font-weight:700; color:var(--gray-800); margin-bottom:3px; line-height:1.3; }
  .kcard-meta { display:flex; gap:5px; align-items:center; margin-bottom:6px; }
  .kcard-num  { font-size:9px; font-family:monospace; color:var(--gray-400); }
  .kcard-tags { display:flex; gap:4px; flex-wrap:wrap; }
  .ktag { font-size:9px; font-weight:600; padding:2px 6px; border-radius:20px; }
  .ktag.assoc { background:var(--brg-10); color:var(--brg); }
  .ktag.rm    { background:var(--gray-100); color:var(--gray-600); }
  .kcol-empty { text-align:center; padding:16px 0; color:var(--gray-200); font-size:11px; }

  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-thumb { background:var(--gray-200); border-radius:3px; }

  /* Tooltip nom complet */
  .nom-cell[title]:hover::after {
    content:attr(title); position:fixed; background:#1f2937; color:#fff;
    font-size:11px; padding:4px 8px; border-radius:5px; z-index:100;
    white-space:nowrap; pointer-events:none; margin-top:20px;
  }
</style>
</head>

    <div class="nav-section">Tableau de bord</div>
    <a class="nav-item" href="index.html" data-label="Supervision dossiers">

    <div class="content" id="content"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const ETAPES = [
  { id:'afaire',     label:'À faire',         short:'À<br>faire',        sp:false },
  { id:'prod',       label:'Prod ok',          short:'Prod<br>ok',        sp:false },
  { id:'rm',         label:'RM ok',            short:'RM<br>ok',          sp:false },
  { id:'associe',    label:'Associé ok',       short:'Associé<br>ok',     sp:false },
  { id:'prez',       label:'Préz client',      short:'Préz<br>client',    sp:false },
  { id:'modif',      label:'Modif à faire',    short:'Modif<br>à faire',  sp:true  },
  { id:'liasse_rev', label:'Liasse à réviser', short:'Liasse<br>réviser', sp:false },
  { id:'liasse_ok',  label:'Liasse ok',        short:'Liasse<br>ok',      sp:false },
  { id:'liasse_env', label:'Liasse envoyée',   short:'Liasse<br>envoyée', sp:false },
];

const CLOTURES  = [{a:'2025',m:'12'},{a:'2025',m:'09'},{a:'2025',m:'06'},{a:'2024',m:'12'}];
const MOIS_NOMS = ['','Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const ASSOCIES  = ['MARTIN','DUPONT','LEFEBVRE'];
const RMS       = ['MOREAU','BERNARD','PETIT','RICHARD','GARCIA','THOMAS','LEROY','SIMON'];
const NOMS = {
  P:   ['PHARMACIE DU CENTRE','GRANDE PHARMACIE','PHARMACIE DE LA GARE','PHARMACIE DES HALLES','PHARMACIE SAINT-JEAN','PHARMACIE DU MARCHÉ','PHARMACIE DE L\'ÉGLISE','PHARMACIE DES FLEURS','PHARMACIE PRINCIPALE','PHARMACIE DU PARC','PHARMACIE DU BOURG','PHARMACIE DE LA PLACE','PHARMACIE DES ARCADES','PHARMACIE DU CHÂTEAU','PHARMACIE LAFAYETTE','PHARMACIE VOLTAIRE','PHARMACIE VICTOR HUGO','PHARMACIE GAMBETTA','PHARMACIE JEAN JAURÈS','PHARMACIE FOCH','PHARMACIE CLEMENCEAU','PHARMACIE DU LAC','PHARMACIE PASTEUR','PHARMACIE CENTRALE'],
  SP:  ['SPFPL SANTÉ QUERCY','SPFPL PHARMA INVEST','SPFPL DU MIDI','SPFPL LOTOISE','SPFPL OFFICINE PLUS','SPFPL MÉDICAP','SPFPL PHARMA SUD','SPFPL AVENIR SANTÉ'],
  SCI: ['SCI LES ACACIAS','SCI DU PARC','SCI SAINT-PIERRE','SCI LES OLIVIERS','SCI LA BASTIDE','SCI DU CHÂTAIGNIER','SCI LES PLATANES','SCI DU MOULIN','SCI LES CERISIERS','SCI BELLE VUE','SCI LES VIGNES','SCI DU CAUSSE'],
  ST:  ['SAS PHARMA GESTION','SARL OFFICINE SERVICES','SAS SANTÉ PLUS','SARL MÉDICO CONSEIL','SAS QUERCY SANTÉ','SARL PHARMA DÉVELOPP.','SAS OFFICINE HOLDING','SARL SANTÉ INVEST'],
};
const PER_PAGE = 50;
const BATCHES  = [['2025-12',548],['2025-09',78],['2025-06',42],['2024-12',95]];

function seededRng(s) { return () => { s=(s*16807)%2147483647; return (s-1)/2147483646; }; }

const ALL = (function() {
  const all=[]; let gid=1;
  for (const [cl,count] of BATCHES) {
    const rng=seededRng(parseInt(cl.replace('-',''))+count*7);
    const ri=n=>Math.floor(rng()*n);
    for (let i=0;i<count;i++) {
      const tr=rng();
      const type=tr<.55?'P':tr<.70?'SP':tr<.85?'SCI':'ST';
      const pool=NOMS[type];
      const nom=pool[ri(pool.length)]+' '+String(gid).padStart(4,'0');
      const num=String(1000+ri(8999));
      const stage=ri(9);
      const st={afaire:false,prod:false,rm:false,associe:false,prez:false,modif:false,liasse_rev:false,liasse_ok:false,liasse_env:false};
      const seq=['afaire','prod','rm','associe','prez','liasse_rev','liasse_ok','liasse_env'];
      if(stage===5){['afaire','prod','rm','associe','prez','modif'].forEach(k=>st[k]=true);}
      else{seq.slice(0,Math.min(stage,seq.length)).forEach(k=>st[k]=true);}
      all.push({id:gid++,num,nom,type,associe:ASSOCIES[ri(3)],rm:RMS[ri(8)],cloture:cl,statuts:st});
    }
  }
  return all;
})();

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentView = 'tableau';
let currentPage = 1;
let dragId      = null;
// Filtres par étape : null = pas de filtre, true = coché, false = non coché
const etapeFilters = {};
ETAPES.forEach(e => etapeFilters[e.id] = null);

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function toggleSidebar() {
  const sb=document.getElementById('sidebar');
  const ico=document.getElementById('sbToggleIcon');
  sb.classList.toggle('collapsed');
  ico.textContent=sb.classList.contains('collapsed')?'▶':'◀';
}

// ── SÉLECTEURS ────────────────────────────────────────────────────────────────
function initSelectors() {
  const annees=[...new Set(CLOTURES.map(c=>c.a))];
  const selA=document.getElementById('sel-annee');
  annees.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;selA.appendChild(o);});
  selA.value='2025'; populateMois('2025');
}
function populateMois(annee) {
  const selM=document.getElementById('sel-mois'); selM.innerHTML='';
  CLOTURES.filter(c=>c.a===annee).forEach(c=>{const o=document.createElement('option');o.value=c.m;o.textContent=MOIS_NOMS[parseInt(c.m)];selM.appendChild(o);});
}
function onAnneeChange(){populateMois(document.getElementById('sel-annee').value);renderAll();}

// ── FILTRES ÉTAPE ─────────────────────────────────────────────────────────────
// Cycle : null → true (coché) → false (non coché) → null
function cycleEtapeFilter(etapeId) {
  const cur=etapeFilters[etapeId];
  etapeFilters[etapeId] = cur===null ? true : cur===true ? false : null;
  updateFilterLegend();
  currentPage=1;
  renderAll();
}
function clearEtapeFilters() {
  ETAPES.forEach(e=>etapeFilters[e.id]=null);
  updateFilterLegend();
  currentPage=1;
  renderAll();
}
function updateFilterLegend() {
  const active=ETAPES.some(e=>etapeFilters[e.id]!==null);
  document.getElementById('filter-legend').style.display=active?'flex':'none';
}

// ── DONNÉES FILTRÉES ──────────────────────────────────────────────────────────
function getFiltered() {
  const annee =document.getElementById('sel-annee').value;
  const mois  =document.getElementById('sel-mois').value;
  const type  =document.getElementById('sel-type').value;
  const assoc =document.getElementById('sel-assoc').value;
  const rm    =document.getElementById('sel-rm').value;
  const search=document.getElementById('search').value.toLowerCase().trim();
  const cl    =annee+'-'+mois;
  return ALL.filter(d => {
    if(d.cloture!==cl) return false;
    if(type   && d.type!==type) return false;
    if(assoc  && d.associe!==assoc) return false;
    if(rm     && d.rm!==rm) return false;
    if(search && !d.nom.toLowerCase().includes(search) && !d.num.includes(search)) return false;
    // Filtres par étape
    for(const e of ETAPES) {
      if(etapeFilters[e.id]===null) continue;
      if(etapeFilters[e.id]===true  && !d.statuts[e.id]) return false;
      if(etapeFilters[e.id]===false &&  d.statuts[e.id]) return false;
    }
    return true;
  });
}

// ── VUE ───────────────────────────────────────────────────────────────────────
function setView(v) {
  currentView=v; currentPage=1;
  document.getElementById('btn-tableau').classList.toggle('active',v==='tableau');
  document.getElementById('btn-kanban').classList.toggle('active', v==='kanban');
  renderAll();
}

function renderAll() {
  const filtered=getFiltered();
  document.getElementById('s-total').textContent=filtered.length;
  document.getElementById('s-env').textContent  =filtered.filter(d=>d.statuts.liasse_env).length;
  document.getElementById('s-modif').textContent=filtered.filter(d=>d.statuts.modif&&!d.statuts.liasse_rev).length;
  document.getElementById('s-debut').textContent=filtered.filter(d=>!d.statuts.prod).length;
  const annee=document.getElementById('sel-annee').value;
  const mois =document.getElementById('sel-mois').value;
  document.getElementById('topbar-periode').textContent='Clôture '+MOIS_NOMS[parseInt(mois)]+' '+annee;
  if(currentView==='tableau') renderTableau(filtered);
  else renderKanban(filtered);
}

// ── TABLEAU ───────────────────────────────────────────────────────────────────
function renderTableau(filtered) {
  const totalPages=Math.max(1,Math.ceil(filtered.length/PER_PAGE));
  if(currentPage>totalPages) currentPage=1;
  const paged=filtered.slice((currentPage-1)*PER_PAGE,currentPage*PER_PAGE);
  const content=document.getElementById('content');
  content.innerHTML='';
  const wrap=document.createElement('div');

  const twrap=document.createElement('div'); twrap.className='table-wrap';
  const tbl  =document.createElement('table');

  // ── Thead
  const thead=document.createElement('thead');

  // Ligne 1 : labels colonnes
  const trh=document.createElement('tr'); trh.className='tr-header';
  // Colonnes fixes
  [
    {l:'N°',      w:48,  cls:''},
    {l:'Nom',     w:160, cls:'th-left'},
    {l:'Type',    w:44,  cls:''},
    {l:'Ass.',    w:44,  cls:''},
    {l:'RM',      w:44,  cls:''},
  ].forEach(h=>{
    const th=document.createElement('th'); th.className=h.cls;
    if(h.w) {th.style.width=h.w+'px'; th.style.minWidth=h.w+'px';}
    th.textContent=h.l; trh.appendChild(th);
  });
  // Colonnes étapes
  ETAPES.forEach(e=>{
    const th=document.createElement('th');
    th.className='th-etape'+(e.sp?' sp':'');
    th.title=e.label; th.innerHTML=e.short; trh.appendChild(th);
  });
  thead.appendChild(trh);

  // Ligne 2 : filtres par étape
  const trf=document.createElement('tr'); trf.className='tr-filters';
  // Cellules vides pour les colonnes fixes (5 colonnes)
  for(let i=0;i<5;i++){
    const td=document.createElement('td'); td.className='td-spacer'; trf.appendChild(td);
  }
  // Boutons filtre pour chaque étape
  ETAPES.forEach(e=>{
    const td=document.createElement('td');
    const btn=document.createElement('button');
    btn.className='etape-filter-btn';
    btn.title='Filtrer : '+e.label;
    // État visuel selon le filtre actif
    const f=etapeFilters[e.id];
    if(f===true)       { btn.classList.add(e.sp?'on-sp':'on-ok'); btn.textContent='✓'; }
    else if(f===false) { btn.classList.add('on-no'); btn.textContent='✗'; }
    else               { btn.textContent='·'; }
    btn.addEventListener('click',()=>cycleEtapeFilter(e.id));
    td.appendChild(btn);
    trf.appendChild(td);
  });
  thead.appendChild(trf);
  tbl.appendChild(thead);

  // ── Tbody
  const tbody=document.createElement('tbody');
  paged.forEach(d=>{
    const tr=document.createElement('tr');

    // N°
    const tdNum=document.createElement('td'); tdNum.className='td-mono'; tdNum.textContent=d.num; tr.appendChild(tdNum);

    // Nom (compact, tronqué avec tooltip)
    const tdNom=document.createElement('td'); tdNom.className='td-left';
    const nomSpan=document.createElement('span'); nomSpan.className='nom-cell';
    nomSpan.textContent=d.nom; nomSpan.title=d.nom;
    tdNom.appendChild(nomSpan); tr.appendChild(tdNom);

    // Type
    const tdType=document.createElement('td');
    tdType.innerHTML=`<span class="badge-type badge-${d.type}">${d.type}</span>`;
    tr.appendChild(tdType);

    // Associé — initiales
    const tdAssoc=document.createElement('td');
    tdAssoc.innerHTML=`<span class="badge-assoc" title="${d.associe}">${ini(d.associe)}</span>`;
    tr.appendChild(tdAssoc);

    // RM — initiales
    const tdRm=document.createElement('td');
    tdRm.innerHTML=`<span class="rm-text" title="${d.rm}">${ini(d.rm)}</span>`;
    tr.appendChild(tdRm);

    // Cases étapes
    ETAPES.forEach(e=>{
      const td=document.createElement('td');
      const checked=d.statuts[e.id];
      const cls=checked?(e.sp?'sp':'ok'):'';
      const strokeColor=e.sp?'#d97706':'#166534';
      td.innerHTML=`<div class="check-cell ${cls}" title="${e.label}" data-id="${d.id}" data-etape="${e.id}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="${strokeColor}" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </div>`;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);

  // Délégation
  tbody.addEventListener('click',e=>{
    const cell=e.target.closest('.check-cell');
    if(!cell) return;
    toggleStatut(parseInt(cell.dataset.id),cell.dataset.etape);
  });

  twrap.appendChild(tbl); wrap.appendChild(twrap);
  if(totalPages>1) wrap.appendChild(buildPagination(currentPage,totalPages,filtered.length));
  content.appendChild(wrap);
}

function buildPagination(page,totalPages,total) {
  const div=document.createElement('div'); div.className='pagination';
  const info=document.createElement('span'); info.className='pag-info';
  info.textContent=`${(page-1)*PER_PAGE+1}–${Math.min(page*PER_PAGE,total)} sur ${total} dossiers`;
  const btns=document.createElement('div'); btns.className='pag-btns';
  const btn=(label,target,disabled,active)=>{
    const b=document.createElement('button'); b.className='p-btn'+(active?' active':'');
    b.textContent=label; b.disabled=!!disabled;
    if(!disabled) b.onclick=()=>{currentPage=target;renderAll();};
    btns.appendChild(b);
  };
  const pages=[]; const delta=2;
  for(let i=Math.max(1,page-delta);i<=Math.min(totalPages,page+delta);i++) pages.push(i);
  btn('«',1,page===1,false);
  btn('‹',page-1,page===1,false);
  if(pages[0]>1){const e=document.createElement('span');e.className='pag-ell';e.textContent='…';btns.appendChild(e);}
  pages.forEach(p=>btn(p,p,false,p===page));
  if(pages[pages.length-1]<totalPages){const e=document.createElement('span');e.className='pag-ell';e.textContent='…';btns.appendChild(e);}
  btn('›',page+1,page===totalPages,false);
  btn('»',totalPages,page===totalPages,false);
  div.appendChild(info); div.appendChild(btns);
  return div;
}

// ── KANBAN ────────────────────────────────────────────────────────────────────
function getColonne(st) {
  const ordre=['afaire','prod','rm','associe','prez','modif','liasse_rev','liasse_ok','liasse_env'];
  let last=null; ordre.forEach(e=>{if(st[e]) last=e;}); return last;
}

function renderKanban(filtered) {
  const content=document.getElementById('content');
  content.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='kanban-wrap';
  ETAPES.forEach(etape=>{
    const items=filtered.filter(d=>getColonne(d.statuts)===etape.id);
    const col=document.createElement('div'); col.className='kanban-col'; col.dataset.etape=etape.id;
    col.innerHTML=`
      <div class="kcol-header ${etape.sp?'sp':''}">
        <span class="kcol-title ${etape.sp?'sp':''}">${etape.label}</span>
        <span class="kcol-count ${etape.sp?'sp':''}">${items.length}</span>
      </div>
      <div class="kcol-cards"></div>
    `;
    const cardsDiv=col.querySelector('.kcol-cards');
    if(items.length===0){cardsDiv.innerHTML='<div class="kcol-empty">—</div>';}
    else {
      items.forEach(d=>{
        const card=document.createElement('div'); card.className='kcard'; card.draggable=true; card.dataset.id=d.id;
        card.innerHTML=`
          <div class="kcard-name">${d.nom}</div>
          <div class="kcard-meta">
            <span class="kcard-num">${d.num}</span>
            <span class="badge-type badge-${d.type}">${d.type}</span>
          </div>
          <div class="kcard-tags">
            <span class="ktag assoc" title="${d.associe}">${ini(d.associe)}</span>
            <span class="ktag rm" title="${d.rm}">${ini(d.rm)}</span>
          </div>
        `;
        card.addEventListener('dragstart',()=>{dragId=d.id;setTimeout(()=>card.classList.add('dragging'),0);});
        card.addEventListener('dragend',  ()=>{dragId=null;card.classList.remove('dragging');});
        cardsDiv.appendChild(card);
      });
    }
    col.addEventListener('dragover', e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',     ()=>{col.classList.remove('drag-over');if(dragId!==null) moveToColonne(dragId,etape.id);});
    wrap.appendChild(col);
  });
  content.appendChild(wrap);
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function toggleStatut(id,etape) {
  const d=ALL.find(x=>x.id===id); if(!d) return;
  d.statuts[etape]=!d.statuts[etape]; renderAll();
}
function moveToColonne(dossierId,colonneId) {
  const d=ALL.find(x=>x.id===dossierId); if(!d) return;
  const seq=['afaire','prod','rm','associe','prez','liasse_rev','liasse_ok','liasse_env'];
  if(colonneId==='modif'){
    ['afaire','prod','rm','associe','prez','modif'].forEach(k=>d.statuts[k]=true);
    ['liasse_rev','liasse_ok','liasse_env'].forEach(k=>d.statuts[k]=false);
  } else {
    const idx=seq.indexOf(colonneId);
    seq.forEach((k,i)=>d.statuts[k]=i<=idx);
    d.statuts.modif=false;
  }
  renderAll();
}

// ── INITIALES ─────────────────────────────────────────────────────────────────
function ini(name) {
  // "MOREAU" → "MO", "LEFEBVRE" → "LE", etc.
  return name.substring(0,2);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
initSelectors();
renderAll();
</script>
